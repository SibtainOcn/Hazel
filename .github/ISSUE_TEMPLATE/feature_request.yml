name: 💡 Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: "What problem does this feature solve? What's frustrating about the current behavior?"
      placeholder: "I find it frustrating when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: "How would you like this to work?"
      placeholder: "I'd like to be able to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Have you considered any workarounds or alternative approaches?"
      placeholder: "I've tried..."
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Mockups / References
      description: "Any screenshots, mockups, or links to similar features in other apps?"
      placeholder: "Drag & drop images here or paste links..."
    validations:
      required: false
